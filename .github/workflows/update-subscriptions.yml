name: Update subscriptions

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Discover public subscription sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/discover_github.py --config discovery.yaml --output discovered_sources.yaml
      - run: python scripts/aggregate.py
      - name: Publish generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/ discovered_sources.yaml
          git diff --cached --quiet || git commit -m "chore: update subscriptions"
          git push
